<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 640" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Read path: Portfolio Health page render</title>
<desc>Sequence of operations from URL navigation to rendered pixels.</desc>
