<line x1="220" y1="516" x2="220" y2="540" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="160" y="540" width="120" height="56" rx="6" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="ts" x="220" y="562" text-anchor="middle" fill="#E06840">Each row uses</text>
<text class="ts" x="220" y="580" text-anchor="middle" fill="#FF8060">HealthBadge primitive</text>

<line x1="280" y1="568" x2="600" y2="568" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="600" y="540" width="40" height="56" rx="6" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="620" y="568" text-anchor="middle">Paint</text>

<text class="th" x="40" y="624">All synchronous in prototype. For prod port, hooks become async data fetches; engine becomes server work; result shape unchanged.</text>
