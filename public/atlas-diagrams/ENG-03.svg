<path d="M500 408 Q420 460 220 480" stroke="#2A80D0" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>

<rect x="160" y="460" width="120" height="56" rx="6" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
