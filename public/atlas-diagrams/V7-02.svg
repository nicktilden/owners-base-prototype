<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>DualStatusBadge primitive</title>
<desc>Visual specification for the dual-state badge that conveys current and forecast status simultaneously.</desc>
<defs>
<style>
.t { font-size: 14px; fill:#D8E4EE; }
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
.tiny { font-size: 11px; fill:rgba(255,255,255,0.6); }
.label { font-size: 11px; font-weight: 500; fill:#D8E4EE; }
</style>
</defs>

<text class="th" x="40" y="32">DualStatusBadge — anatomy</text>

<rect x="40" y="70" width="56" height="24" rx="12" fill="#101808" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="68" y1="72" x2="68" y2="92" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<rect x="40" y="70" width="28" height="24" rx="12" ry="12" fill="#101808" stroke="none"/>
<rect x="68" y="70" width="28" height="24" fill="#221A0A" stroke="none"/>
<rect x="40" y="70" width="56" height="24" rx="12" fill="none" stroke="#3B6D11" stroke-width="0.5"/>

<line x1="44" y1="94" x2="44" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="tiny" x="48" y="128">Current state</text>

<line x1="92" y1="94" x2="92" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="tiny" x="96" y="128">Forecast state</text>

<line x1="68" y1="50" x2="68" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="tiny" x="130" y="58">Divider rule (0.5px)</text>

<text class="th" x="40" y="160">Variants</text>

<rect x="40" y="180" width="56" height="24" rx="12" fill="#101808" stroke="#3B6D11" stroke-width="0.5"/>
<rect x="68" y="180" width="28" height="24" fill="#101808"/>
<rect x="40" y="180" width="56" height="24" rx="12" fill="none" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="68" y1="182" x2="68" y2="202" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="110" y="196">Healthy now, Healthy forecast</text>

<rect x="40" y="216" width="56" height="24" rx="12" fill="#101808" stroke="#3B6D11" stroke-width="0.5"/>
<rect x="68" y="216" width="28" height="24" fill="#221A0A"/>
<rect x="40" y="216" width="56" height="24" rx="12" fill="none" stroke="#C07A18" stroke-width="0.5"/>
<line x1="68" y1="218" x2="68" y2="238" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="110" y="232">Healthy now, At Risk forecast — the demo state</text>

<rect x="40" y="252" width="56" height="24" rx="12" fill="#221A0A" stroke="#C07A18" stroke-width="0.5"/>
<rect x="68" y="252" width="28" height="24" fill="#1E0A0A"/>
<rect x="40" y="252" width="56" height="24" rx="12" fill="none" stroke="#D04848" stroke-width="0.5"/>
<line x1="68" y1="254" x2="68" y2="274" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="110" y="268">At Risk now, Critical forecast — degrading</text>

<rect x="40" y="288" width="56" height="24" rx="12" fill="#1E0A0A" stroke="#D04848" stroke-width="0.5"/>
<rect x="68" y="288" width="28" height="24" fill="#221A0A"/>
<rect x="40" y="288" width="56" height="24" rx="12" fill="none" stroke="#D04848" stroke-width="0.5"/>
<line x1="68" y1="290" x2="68" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="110" y="304">Critical now, At Risk forecast — improving</text>

<rect x="40" y="324" width="56" height="24" rx="12" fill="#101808" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
<rect x="68" y="324" width="28" height="24" fill="#101808" opacity="0.6"/>
<rect x="40" y="324" width="56" height="24" rx="12" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
<polygon points="84,326 92,326 88,332" fill="#F0B060"/>
<line x1="68" y1="326" x2="68" y2="346" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="110" y="340">Degraded — incomplete data, triangle indicator</text>

<rect x="40" y="360" width="56" height="24" rx="12" fill="#171F2B" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="tiny" x="68" y="376" text-anchor="middle" fill="rgba(255,255,255,0.6)">— · —</text>
<text class="ts" x="110" y="376">First-run — tracking begins today</text>

<text class="th" x="40" y="420">Accessibility — secondary encoding</text>

<text class="label" x="40" y="448">Healthy</text>
<circle cx="100" cy="444" r="5" fill="#90D850"/>

<text class="label" x="140" y="448">On track</text>
<circle cx="200" cy="444" r="5" fill="#101808" stroke="#3B6D11" stroke-width="1.5"/>

<text class="label" x="240" y="448">At risk</text>
<polygon points="295,439 301,444 295,449 289,444" fill="#F0B060"/>

<text class="label" x="320" y="448">Critical</text>
<polygon points="375,439 381,444 375,449 369,444" fill="none" stroke="#D04848" stroke-width="1.5"/>
<line x1="370" y1="441" x2="380" y2="447" stroke="#D04848" stroke-width="0.5"/>

<text class="ts" x="40" y="478">Every status is encoded in two ways: color from the R/Y/G ramp + shape (filled circle, outlined</text>
<text class="ts" x="40" y="496">circle, filled diamond, outlined diamond with hatch). Color-blind-safe by construction.</text>

<text class="th" x="40" y="540">Spec</text>
<text class="ts" x="40" y="560">56px wide × 24px tall · 12px corner radius (pill) · 0.5px stroke · vertical divider rule at midpoint · semantic shape primitives overlay color</text>
</svg>