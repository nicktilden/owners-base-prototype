<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 660" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Approval workflow integration</title>
<desc>How the existing Procore Workflows tool integrates with Risk Type approval triggers. Threshold breach fires a workflow which gates the tag's lifecycle.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
.tiny { font-size: 11px; fill:rgba(255,255,255,0.4); }
.mono { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px; fill:#D8E4EE; }
</style>
</defs>

<rect x="40" y="40" width="200" height="76" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="140" y="62" text-anchor="middle" fill="#8B84E0">RiskType.approvalTriggers</text>
<text class="ts" x="140" y="80" text-anchor="middle" fill="#A89EF0">Configured by admin</text>
<text class="mono" x="56" y="100">if cost impact &gt; $250K</text>

<line x1="240" y1="78" x2="280" y2="78" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="280" y="40" width="200" height="76" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="380" y="62" text-anchor="middle" fill="#E06840">Tag created</text>
<text class="ts" x="380" y="80" text-anchor="middle" fill="#FF8060">Cost Risk on RFI #4127</text>
<text class="ts" x="380" y="98" text-anchor="middle" fill="#FF8060">Expected impact: $300K</text>

<line x1="480" y1="78" x2="520" y2="78" stroke="#C84820" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="520" y="40" width="160" height="76" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="600" y="62" text-anchor="middle" fill="#D89040">Trigger evaluates</text>
<text class="ts" x="600" y="80" text-anchor="middle" fill="#F0B060">$300K &gt; $250K</text>
<text class="ts" x="600" y="98" text-anchor="middle" fill="#F0B060">→ fire workflow</text>

<line x1="600" y1="116" x2="600" y2="148" stroke="#C07A18" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="148" width="640" height="100" rx="8" fill="#2A1E0A" stroke="#D09820" stroke-width="0.5"/>
<text class="th" x="360" y="172" text-anchor="middle" fill="#C89028">Existing Procore Workflows tool kicks off</text>
<text class="ts" x="360" y="194" text-anchor="middle" fill="#E8B840">Workflow: cost-risk-approval-v2</text>
<text class="ts" x="360" y="212" text-anchor="middle" fill="#E8B840">Steps: PM review → Director approval → Owner sign-off</text>
<text class="ts" x="360" y="230" text-anchor="middle" fill="#E8B840">This is the existing tool, not Health & Risk-specific. Workflow lives at the object level.</text>

<line x1="120" y1="248" x2="120" y2="280" stroke="#D09820" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="600" y1="248" x2="600" y2="280" stroke="#D09820" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="280" width="200" height="80" rx="8" fill="#2A1E0A" stroke="#D09820" stroke-width="0.5"/>
<text class="th" x="140" y="304" text-anchor="middle" fill="#C89028">Tag enters Pending Approval</text>
<text class="ts" x="140" y="322" text-anchor="middle" fill="#E8B840">Visible on tag in all surfaces</text>
<text class="ts" x="140" y="340" text-anchor="middle" fill="#E8B840">Locked from edits during review</text>

<rect x="500" y="280" width="200" height="80" rx="8" fill="#2A1E0A" stroke="#D09820" stroke-width="0.5"/>
<text class="th" x="600" y="304" text-anchor="middle" fill="#C89028">Workflow runs to completion</text>
<text class="ts" x="600" y="322" text-anchor="middle" fill="#E8B840">Procore handles the workflow</text>
<text class="ts" x="600" y="340" text-anchor="middle" fill="#E8B840">No Health &amp; Risk logic involved</text>

<line x1="600" y1="360" x2="600" y2="402" stroke="#D09820" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="500" y="402" width="200" height="80" rx="8" fill="#1A2535" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="600" y="424" text-anchor="middle">Workflow result</text>
<text class="ts" x="600" y="444" text-anchor="middle">Approved → tag returns to Open</text>
<text class="ts" x="600" y="462" text-anchor="middle">Rejected → Open with note,</text>
<text class="ts" x="600" y="478" text-anchor="middle">requires revision</text>

<path d="M500 442 Q380 442 240 360" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>

<text class="th" x="40" y="520">What the prototype builds vs. what the production version uses</text>

<rect x="40" y="538" width="320" height="100" rx="8" fill="#1A2535" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="56" y="560">Prototype</text>
<text class="ts" x="56" y="580">— Trigger condition fires correctly when configured</text>
<text class="ts" x="56" y="598">— Tag visibly enters Pending Approval state</text>
<text class="ts" x="56" y="616">— Workflows tool integration is mocked: shows steps, mock-complete affordance</text>
<text class="ts" x="56" y="634">— On user "Mock Approve," tag returns to Open</text>

<rect x="380" y="538" width="320" height="100" rx="8" fill="#1A2535" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="396" y="560">Production</text>
<text class="ts" x="396" y="580">— Trigger fires on real Procore data via the engine</text>
<text class="ts" x="396" y="598">— Tag enters Pending Approval, real workflow API called</text>
<text class="ts" x="396" y="616">— Workflow executes through Procore Workflows tool's existing logic</text>
<text class="ts" x="396" y="634">— Webhook or polling returns workflow result, tag transitions</text>
</svg>