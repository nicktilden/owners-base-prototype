<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Threshold edit propagation</title>
<desc>What happens when a user changes a threshold from inside a tearsheet.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill:#D8E4EE; }
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
</style>
</defs>

<rect x="40" y="40" width="200" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="140" y="66" text-anchor="middle" fill="#E06840">User drags threshold</text>
<text class="ts" x="140" y="84" text-anchor="middle" fill="#FF8060">Inside tearsheet</text>

<rect x="40" y="120" width="200" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="140" y="146" text-anchor="middle" fill="#E06840">onChange fires</text>
<text class="ts" x="140" y="164" text-anchor="middle" fill="#FF8060">setThreshold(id, value)</text>

<rect x="40" y="200" width="200" height="56" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="140" y="226" text-anchor="middle" fill="#8B84E0">HealthConfigProvider</text>
<text class="ts" x="140" y="244" text-anchor="middle" fill="#A89EF0">state updates</text>

<rect x="40" y="280" width="200" height="76" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="140" y="304" text-anchor="middle" fill="#8B84E0">Scope check</text>
<text class="ts" x="140" y="322" text-anchor="middle" fill="#A89EF0">Account or project-level?</text>
<text class="ts" x="140" y="340" text-anchor="middle" fill="#A89EF0">Project = override marker</text>

<line x1="140" y1="96" x2="140" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="140" y1="176" x2="140" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="140" y1="256" x2="140" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="240" y1="228" x2="320" y2="228" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="320" y="60" width="200" height="56" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="420" y="86" text-anchor="middle" fill="#2EA888">All consumers</text>
<text class="ts" x="420" y="104" text-anchor="middle" fill="#4EC9A8">React rerender</text>

<rect x="320" y="140" width="200" height="56" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="420" y="166" text-anchor="middle" fill="#2EA888">useMemo cache miss</text>
<text class="ts" x="420" y="184" text-anchor="middle" fill="#4EC9A8">Inputs changed</text>

<rect x="320" y="220" width="200" height="56" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="420" y="246" text-anchor="middle" fill="#2EA888">Engine re-runs</text>
<text class="ts" x="420" y="264" text-anchor="middle" fill="#4EC9A8">All affected projects</text>

<rect x="320" y="300" width="200" height="56" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="420" y="326" text-anchor="middle" fill="#2EA888">New HealthResult[]</text>
<text class="ts" x="420" y="344" text-anchor="middle" fill="#4EC9A8">Status may change</text>

<line x1="420" y1="116" x2="420" y2="140" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="420" y1="196" x2="420" y2="220" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="420" y1="276" x2="420" y2="300" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="520" y1="328" x2="600" y2="328" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="540" y="200" width="100" height="160" rx="8" fill="#0D1E30" stroke="#2A80D0" stroke-width="0.5"/>
<text class="th" x="590" y="224" text-anchor="middle" fill="#4D90D8">UI updates</text>
<text class="ts" x="590" y="244" text-anchor="middle" fill="#0D2540">Badges</text>
<text class="ts" x="590" y="262" text-anchor="middle" fill="#0D2540">Sparklines</text>
<text class="ts" x="590" y="280" text-anchor="middle" fill="#0D2540">KPI cards</text>
<text class="ts" x="590" y="298" text-anchor="middle" fill="#0D2540">Table rows</text>
<text class="ts" x="590" y="316" text-anchor="middle" fill="#0D2540">Tearsheet</text>

<text class="th" x="40" y="410">Performance budget for prototype</text>
<text class="ts" x="40" y="430">10 projects × 6 dimensions × 2 paths = 120 calculations per recalc. Each is O(1) on already-loaded data.</text>
<text class="ts" x="40" y="448">Total recalc target: under 16ms for 60fps drag feedback. Achievable because everything is in-memory and pure.</text>
<text class="ts" x="40" y="466">If a drag stutters, the fix is memoizing per-project calculations keyed on (projectId, configHash, recordsHash).</text>

<text class="th" x="40" y="500">Snapshot history</text>
<text class="ts" x="40" y="520">A debounced effect (5s after last edit) appends a HealthSnapshot to history so the trend sparkline has data.</text>
<text class="ts" x="40" y="538">Live drag does not pollute history — only settled values do. Otherwise the trend becomes noise.</text>
</svg>