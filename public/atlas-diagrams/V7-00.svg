<text class="th" x="40" y="480">What changed from v6</text>

<text class="ts" x="40" y="504">RiskRecord is removed. RiskTag (the new core object) attaches to existing source items by sourceType + sourceId.</text>
<text class="ts" x="40" y="522">A single source item can carry multiple tags — a Change Event might be both Cost Risk and Schedule Risk.</text>
<text class="ts" x="40" y="540">When the source item closes, the tag auto-closes by default (overrideable per tag). Tag history retained.</text>

<text class="ts" x="40" y="568">ManualRiskItem is the escape hatch — used when no source Procore object represents the risk.</text>
<text class="ts" x="40" y="586">Behaves identically to a tag in the engine, but has its own title and description fields.</text>

<text class="ts" x="40" y="614">RiskType now defines automation rules and approval triggers in addition to fields and lifecycle.</text>
<text class="ts" x="40" y="632">RiskTypeRule fires automatically — auto-create a tag, or surface as a signal for user review.</text>
<text class="ts" x="40" y="650">ApprovalTrigger fires the existing Procore Workflows tool when a tag crosses a threshold.</text>

<text class="ts" x="40" y="678">Connect data flows in pre-aggregated. Bypasses normalization. Marked with origin: 'connected_partner.'</text>
<text class="ts" x="40" y="696">A mixed portfolio can include both Owner-managed projects (full detail) and Connected projects (rollups only).</text>

<text class="ts" x="40" y="744">Legend</text>
