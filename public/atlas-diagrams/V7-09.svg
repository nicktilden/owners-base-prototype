<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 720" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Tagging interaction from source tool</title>
<desc>How a user adds a Risk Tag from inside an RFI detail page. The tagging affordance lives inside source object detail pages, with smart inheritance of existing impact fields.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
.tiny { font-size: 11px; fill:rgba(255,255,255,0.4); }
.label { font-size: 11px; font-weight: 500; fill:#D8E4EE; }
</style>
</defs>

<text class="th" x="40" y="36">State 1 — RFI detail page, no tag yet</text>

<rect x="40" y="48" width="320" height="280" rx="6" fill="#1A2535" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="56" y="72">RFI #4127 — Crane footing soil instability</text>
<text class="tiny" x="56" y="88">Tower Block · Open · Assigned: J. Reyes · Aging 8 days</text>

<line x1="56" y1="100" x2="344" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

<text class="ts" x="56" y="124">Subject</text>
<text class="ts" x="56" y="144">Question text from RFI...</text>

<text class="ts" x="56" y="180">Cost Impact</text>
<rect x="56" y="186" width="160" height="22" rx="4" fill="#1E2D3D" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="ts" x="64" y="202">$50,000 - $100,000</text>

<text class="ts" x="56" y="226">Schedule Impact</text>
<rect x="56" y="232" width="160" height="22" rx="4" fill="#1E2D3D" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="ts" x="64" y="248">5-10 days</text>

<line x1="56" y1="270" x2="344" y2="270" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

<text class="th" x="56" y="292">Risk</text>
<rect x="56" y="300" width="120" height="22" rx="4" fill="#1E2D3D" stroke="#2A80D0" stroke-width="1"/>
<text class="ts" x="116" y="316" text-anchor="middle" fill="#4D90D8">Tag as risk →</text>

<line x1="380" y1="180" x2="430" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<text class="th" x="450" y="36">State 2 — User clicks "Tag as risk"</text>

<rect x="450" y="48" width="250" height="320" rx="6" fill="#1A2535" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="466" y="72">Add risk tag</text>
<text class="tiny" x="466" y="88">RFI #4127</text>

<text class="tiny" x="466" y="120">Risk Type *</text>
<rect x="466" y="126" width="216" height="22" rx="4" fill="#1E2D3D" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="ts" x="474" y="142">Site Risk ▾</text>

<text class="tiny" x="466" y="168">Probability (1–5) *</text>
<rect x="466" y="174" width="80" height="22" rx="4" fill="#1E2D3D" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="ts" x="476" y="190">3</text>

<text class="tiny" x="556" y="168">Risk Owner</text>
<rect x="556" y="174" width="126" height="22" rx="4" fill="#1E2D3D" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="ts" x="564" y="190">J. Reyes</text>

<text class="tiny" x="466" y="216">Cost Impact (inherited)</text>
<rect x="466" y="222" width="216" height="22" rx="4" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="ts" x="474" y="238" fill="#2EA888">$50,000 - $100,000 — from RFI</text>

<text class="tiny" x="466" y="264">Schedule Impact (inherited)</text>
<rect x="466" y="270" width="216" height="22" rx="4" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="ts" x="474" y="286" fill="#2EA888">5-10 days — from RFI</text>

<rect x="556" y="324" width="60" height="28" rx="6" fill="#1E2D3D" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text class="tiny" x="586" y="342" text-anchor="middle">Cancel</text>

<rect x="624" y="324" width="58" height="28" rx="6" fill="#0D2540" stroke="#2A80D0" stroke-width="0.5"/>
<text class="tiny" x="653" y="342" text-anchor="middle" fill="#1E2D3D">Save</text>

<text class="th" x="40" y="408">State 3 — After tagging</text>

<rect x="40" y="420" width="660" height="100" rx="6" fill="#1A2535" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="56" y="444">RFI #4127 — Risk panel now populated</text>

<rect x="56" y="460" width="640" height="44" rx="6" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<rect x="68" y="472" width="56" height="20" rx="10" fill="#281E0D"/>
<rect x="96" y="472" width="28" height="20" fill="#281E0D"/>
<rect x="68" y="472" width="56" height="20" rx="10" fill="none" stroke="#C07A18" stroke-width="0.5"/>
<line x1="96" y1="474" x2="96" y2="490" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="140" y="486" fill="#E06840">Site Risk · Open · Probability 3 · Cost $50-100K · J. Reyes</text>
<text class="ts" x="540" y="486" fill="#FF8060">Edit · Close ·</text>

<text class="th" x="40" y="560">Behavior rules</text>

<text class="ts" x="40" y="584">For tools with existing impact fields (RFIs have Cost Impact and Schedule Impact dropdowns), the tag</text>
<text class="ts" x="40" y="602">inherits those values by default. The user can override but doesn't have to re-enter.</text>

<text class="ts" x="40" y="630">For tools without impact fields (Punch List, Correspondence), the tag form shows full impact inputs.</text>

<text class="ts" x="40" y="658">Multiple tags on the same item are allowed. A Change Event might carry both Cost Risk and Schedule Risk</text>
<text class="ts" x="40" y="676">tags with independent probability and impact values.</text>

<text class="ts" x="40" y="704">When the source RFI is closed, the tag auto-closes by default. User can override with autoCloseOnSourceClose: false.</text>
</svg>