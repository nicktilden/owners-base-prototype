<rect x="56" y="506" width="568" height="64" rx="6" fill="#281E0D" stroke="#C07A18" stroke-width="0.5" opacity="0.6"/>
<polygon points="80,520 88,520 84,526" fill="#F0B060"/>
<rect x="92" y="518" width="56" height="20" rx="10" fill="#121E0A" opacity="0.6"/>
<rect x="120" y="518" width="28" height="20" fill="#121E0A" opacity="0.6"/>
<rect x="92" y="518" width="56" height="20" rx="10" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
<line x1="120" y1="520" x2="120" y2="536" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" opacity="0.6"/>
<text class="th" x="164" y="532" fill="#D89040">Quality — degraded</text>

<text class="ts" x="92" y="554" fill="#F0B060">Inspection data not connected. Resolve in Settings → Health & Risk → Dimensions →</text>

<text class="th" x="56" y="600">Pattern — every dimension is the same evidence card</text>
<text class="ts" x="56" y="618">Status badge · dimension name · origin icon · "now / forecast" sentence · linked items · contextual action.</text>
<text class="ts" x="56" y="636">Sorted by impact descending. Degraded cards always at the bottom with a clear resolution path.</text>
