<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 700" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Component hierarchy and state ownership</title>
<desc>React tree showing where state lives so threshold edits propagate correctly.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill:#D8E4EE; }
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
</style>
</defs>

<text class="ts" x="40" y="30">Owns state</text>
<rect x="120" y="22" width="14" height="14" rx="3" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="ts" x="140" y="32">Provides context</text>
<rect x="240" y="22" width="14" height="14" rx="3" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="ts" x="260" y="32">Consumes context</text>
<rect x="370" y="22" width="14" height="14" rx="3" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="ts" x="390" y="32">Pure render</text>

<rect x="240" y="60" width="200" height="56" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="340" y="86" text-anchor="middle" fill="#8B84E0">App root</text>
<text class="ts" x="340" y="104" text-anchor="middle" fill="#A89EF0">All providers nest here</text>

<rect x="40" y="148" width="180" height="64" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="130" y="172" text-anchor="middle" fill="#8B84E0">HealthConfigProvider</text>
<text class="ts" x="130" y="190" text-anchor="middle" fill="#A89EF0">dimensions, thresholds</text>
<text class="ts" x="130" y="206" text-anchor="middle" fill="#A89EF0">setThreshold(id, value)</text>

<rect x="240" y="148" width="180" height="64" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="330" y="172" text-anchor="middle" fill="#8B84E0">RiskRecordsProvider</text>
<text class="ts" x="330" y="190" text-anchor="middle" fill="#A89EF0">records by project</text>
<text class="ts" x="330" y="206" text-anchor="middle" fill="#A89EF0">CRUD + state transitions</text>

<rect x="440" y="148" width="180" height="64" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="530" y="172" text-anchor="middle" fill="#8B84E0">TearsheetProvider</text>
<text class="ts" x="530" y="190" text-anchor="middle" fill="#A89EF0">selectedItem state</text>
<text class="ts" x="530" y="206" text-anchor="middle" fill="#A89EF0">openTearsheet, close</text>

<rect x="240" y="240" width="200" height="56" rx="8" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="340" y="266" text-anchor="middle">Router</text>
<text class="ts" x="340" y="284" text-anchor="middle">Existing PersonaContext + LevelContext</text>

<rect x="40" y="328" width="180" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="130" y="354" text-anchor="middle" fill="#E06840">Portfolio Hub</text>
<text class="ts" x="130" y="372" text-anchor="middle" fill="#FF8060">consumes config + records</text>

<rect x="240" y="328" width="180" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="330" y="354" text-anchor="middle" fill="#E06840">Project Overview</text>
<text class="ts" x="330" y="372" text-anchor="middle" fill="#FF8060">consumes for one project</text>

<rect x="440" y="328" width="180" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="530" y="354" text-anchor="middle" fill="#E06840">Health page</text>
<text class="ts" x="530" y="372" text-anchor="middle" fill="#FF8060">/portfolio/health</text>

<rect x="40" y="412" width="120" height="56" rx="8" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="100" y="438" text-anchor="middle">HealthBadge</text>
<text class="ts" x="100" y="456" text-anchor="middle">primitive</text>

<rect x="180" y="412" width="120" height="56" rx="8" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="240" y="438" text-anchor="middle">HealthSparkline</text>
<text class="ts" x="240" y="456" text-anchor="middle">primitive</text>

<rect x="320" y="412" width="120" height="56" rx="8" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="380" y="438" text-anchor="middle">HealthPopover</text>
<text class="ts" x="380" y="456" text-anchor="middle">on hover</text>

<rect x="460" y="412" width="160" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="540" y="438" text-anchor="middle" fill="#E06840">HealthTearsheet</text>
<text class="ts" x="540" y="456" text-anchor="middle" fill="#FF8060">edits write back to config</text>

<line x1="340" y1="116" x2="130" y2="148" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="116" x2="330" y2="148" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="116" x2="530" y2="148" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="130" y1="212" x2="340" y2="240" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="330" y1="212" x2="340" y2="240" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="530" y1="212" x2="340" y2="240" stroke="#7060E0" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="280" y1="296" x2="130" y2="328" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="296" x2="330" y2="328" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="400" y1="296" x2="530" y2="328" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="100" y1="384" x2="100" y2="412" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="240" y1="384" x2="240" y2="412" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="380" y1="384" x2="380" y2="412" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="540" y1="384" x2="540" y2="412" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<path d="M540 468 Q540 540 220 540 Q130 540 130 212" stroke="#C84820" stroke-width="0.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="370" y="555" text-anchor="middle" fill="#FF8060">Threshold edit from tearsheet calls setThreshold on HealthConfigProvider</text>
<text class="ts" x="370" y="573" text-anchor="middle" fill="#FF8060">— every consumer rerenders, every Health* component recomputes</text>

<text class="th" x="40" y="615">Why state lives this high</text>
<text class="ts" x="40" y="635">HealthConfig must sit above any component that reads thresholds. If it lived inside the Portfolio Hub, an edit</text>
<text class="ts" x="40" y="653">from a Project tearsheet wouldn't propagate. RiskRecords sits at the same level so promotions from any surface</text>
<text class="ts" x="40" y="671">update the Risk Signal aggregation. The TearsheetProvider is shared so only one tearsheet is open at a time —</text>
<text class="ts" x="40" y="689">CONTEXT.md §9 calls this out explicitly. Engine calls happen inside consuming components via memoized hooks.</text>
</svg>