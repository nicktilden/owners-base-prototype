.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
.cell { font-size: 12px; }
</style>
</defs>

<text class="th" x="40" y="50">Capability</text>
<text class="th" x="270" y="50" text-anchor="middle">CEO / CFO</text>
<text class="th" x="370" y="50" text-anchor="middle">PM</text>
<text class="th" x="450" y="50" text-anchor="middle">Super</text>
<text class="th" x="530" y="50" text-anchor="middle">IT Admin</text>
<text class="th" x="620" y="50" text-anchor="middle">Board</text>

<line x1="40" y1="60" x2="640" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

