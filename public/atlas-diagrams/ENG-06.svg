<line x1="40" y1="300" x2="640" y2="300" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

<text class="th" x="40" y="330">How this maps to existing permission model</text>
<text class="ts" x="40" y="352">The existing model in data-model.ts has two layers — tool access (none/read/update/create/admin) and</text>
<text class="ts" x="40" y="370">PermissionKey for non-tool actions. Risk capabilities map to both:</text>
<text class="ts" x="56" y="392">— View / Create map to ToolPermissionLevel on a new 'risk' tool key</text>
<text class="ts" x="56" y="410">— Promote, Transition, Close all require ToolPermissionLevel ≥ 'update' on 'risk'</text>
<text class="ts" x="56" y="428">— Accept needs a new PermissionKey: 'risk:accept' — only EXECUTIVE role group has it by default</text>
<text class="ts" x="56" y="446">— Edit thresholds (project) needs ToolPermissionLevel ≥ 'admin' on 'risk' for that project</text>
<text class="ts" x="56" y="464">— Edit Risk Types and account thresholds need 'risk:configure' — IT Admin only</text>

<text class="th" x="40" y="494">Implementation note</text>
<text class="ts" x="40" y="514">All gates use the existing hasToolPermission() and hasPermissionKey() helpers. No new utilities needed —</text>
<text class="ts" x="40" y="532">just register 'risk' as a tool key and add 'risk:accept' / 'risk:configure' to the PermissionKey union.</text>
<text class="ts" x="40" y="550">UI hides actions the user can't perform; the engine ignores attempts that arrive without permission.</text>
<text class="ts" x="40" y="568">Superintendent's "Safety only" rows enforced at the engine — filter records by dimension before returning.</text>
</svg>