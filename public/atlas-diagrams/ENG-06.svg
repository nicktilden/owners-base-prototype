<text class="t" x="40" y="282">Edit account thresholds</text>
<text class="cell" x="270" y="282" text-anchor="middle" fill="#FF8060">No</text>
<text class="cell" x="370" y="282" text-anchor="middle" fill="#FF8060">No</text>
<text class="cell" x="450" y="282" text-anchor="middle" fill="#FF8060">No</text>
<text class="cell" x="530" y="282" text-anchor="middle" fill="#4EC9A8">Yes</text>
