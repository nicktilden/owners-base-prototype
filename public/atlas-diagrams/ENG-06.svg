<text class="cell" x="270" y="150" text-anchor="middle" fill="#4EC9A8">Yes</text>
<text class="cell" x="370" y="150" text-anchor="middle" fill="#4EC9A8">Yes</text>
<text class="cell" x="450" y="150" text-anchor="middle" fill="#4EC9A8">Safety only</text>
<text class="cell" x="530" y="150" text-anchor="middle" fill="#4EC9A8">Yes</text>
<text class="cell" x="620" y="150" text-anchor="middle" fill="#FF8060">No</text>

