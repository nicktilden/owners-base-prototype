<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 540" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Risk Signal as a query, not an object</title>
<desc>How a Risk Signal resolves to a filtered list of Risk Records.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill:#D8E4EE; }
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
.mono { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; fill:#D8E4EE; }
</style>
</defs>

<rect x="40" y="40" width="280" height="100" rx="8" fill="#0D1E30" stroke="#2A80D0" stroke-width="0.5"/>
<text class="th" x="180" y="64" text-anchor="middle" fill="#4D90D8">SignalDefinition (config)</text>
<text class="mono" x="56" y="86">id: 'safety-exposure-portfolio'</text>
<text class="mono" x="56" y="102">scope: 'portfolio'</text>
<text class="mono" x="56" y="118">filter: { dimension: 'safety',</text>
<text class="mono" x="56" y="134">  status: ['Open', 'Mitigated'] }</text>

<rect x="360" y="40" width="280" height="100" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="500" y="64" text-anchor="middle" fill="#E06840">Risk Records (data)</text>
<text class="ts" x="500" y="86" text-anchor="middle" fill="#FF8060">All records across all projects</text>
<text class="ts" x="500" y="106" text-anchor="middle" fill="#FF8060">Each has: dimension, status,</text>
<text class="ts" x="500" y="124" text-anchor="middle" fill="#FF8060">probability, impact, projectId</text>

<line x1="180" y1="140" x2="280" y2="180" stroke="#2A80D0" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="500" y1="140" x2="400" y2="180" stroke="#C84820" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="240" y="180" width="200" height="64" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="340" y="206" text-anchor="middle" fill="#2EA888">resolveSignal(def, records)</text>
<text class="ts" x="340" y="224" text-anchor="middle" fill="#4EC9A8">Apply filter, aggregate</text>
<text class="ts" x="340" y="240" text-anchor="middle" fill="#4EC9A8">Return matching record IDs</text>

<line x1="340" y1="244" x2="340" y2="280" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="120" y="280" width="440" height="100" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="340" y="304" text-anchor="middle" fill="#8B84E0">Resolved view (computed)</text>
<text class="mono" x="136" y="326">{</text>
<text class="mono" x="148" y="342">recordIds: ['risk_042', 'risk_117', 'risk_203'],</text>
<text class="mono" x="148" y="358">aggregates: { count: 3, totalExposure: 285000,</text>
<text class="mono" x="148" y="374">  topSeverity: 'high', byProject: {...} }</text>
<text class="mono" x="136" y="390"> </text>

<text class="th" x="40" y="430">Why this matters for engineering</text>
<text class="ts" x="40" y="450">A Signal is never stored — it's recomputed every time the filter inputs change. This means:</text>
<text class="ts" x="40" y="470">no sync problem, no stale views, and a Signal "drilling in" is just navigating to a Records list with the filter pre-applied.</text>
<text class="ts" x="40" y="490">A tool-data-only Signal (no Records yet) returns recordIds: [] but still has aggregates from the calculation engine.</text>
<text class="ts" x="40" y="510">Adding a Record to a project automatically affects every Signal whose filter matches — no manual linking needed.</text>
<text class="ts" x="40" y="530">In React: useMemo on (signalDef, records) — recompute is free, no sync logic to write.</text>
</svg>