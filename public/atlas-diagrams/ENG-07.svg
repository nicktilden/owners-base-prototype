<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Data integrity branch and degraded score routing</title>
<desc>How missing or stale data flows through the system to produce a degraded score with a resolution path.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill:#D8E4EE; }
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
</style>
</defs>

<rect x="240" y="40" width="200" height="56" rx="8" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="340" y="66" text-anchor="middle">Normalization runs</text>
<text class="ts" x="340" y="84" text-anchor="middle">For one project, all dimensions</text>

<line x1="340" y1="96" x2="340" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="240" y="120" width="200" height="56" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="340" y="146" text-anchor="middle" fill="#D89040">Check completeness</text>
<text class="ts" x="340" y="164" text-anchor="middle" fill="#F0B060">Required fields present?</text>

<line x1="240" y1="148" x2="160" y2="220" stroke="#C07A18" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="170" y="190" fill="#F0B060">Source disconnected</text>

<line x1="340" y1="176" x2="340" y2="220" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="200" fill="#4EC9A8">All present</text>

<line x1="440" y1="148" x2="520" y2="220" stroke="#C07A18" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="450" y="190" fill="#F0B060">Connected, fields empty</text>

<rect x="40" y="220" width="220" height="76" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="150" y="244" text-anchor="middle" fill="#D89040">Config issue</text>
<text class="ts" x="150" y="262" text-anchor="middle" fill="#F0B060">Dimension enabled, source absent</text>
<text class="ts" x="150" y="280" text-anchor="middle" fill="#F0B060">Resolution: admin connects source</text>

<rect x="280" y="220" width="120" height="76" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="340" y="244" text-anchor="middle" fill="#2EA888">Full score</text>
<text class="ts" x="340" y="262" text-anchor="middle" fill="#4EC9A8">isComplete: true</text>
<text class="ts" x="340" y="280" text-anchor="middle" fill="#4EC9A8">issueType: null</text>

<rect x="420" y="220" width="220" height="76" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="530" y="244" text-anchor="middle" fill="#D89040">Data issue</text>
<text class="ts" x="530" y="262" text-anchor="middle" fill="#F0B060">Source connected, project gap</text>
<text class="ts" x="530" y="280" text-anchor="middle" fill="#F0B060">Resolution: PM populates fields</text>

<line x1="150" y1="296" x2="150" y2="340" stroke="#C07A18" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="296" x2="340" y2="340" stroke="#18A878" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="530" y1="296" x2="530" y2="340" stroke="#C07A18" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="340" width="220" height="60" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="150" y="362" text-anchor="middle" fill="#D89040">Degraded score returned</text>
<text class="ts" x="150" y="380" text-anchor="middle" fill="#F0B060">resolutionPath: '/settings/health'</text>

<rect x="280" y="340" width="120" height="60" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="340" y="362" text-anchor="middle" fill="#2EA888">Score returned</text>
<text class="ts" x="340" y="380" text-anchor="middle" fill="#4EC9A8">No callout</text>

<rect x="420" y="340" width="220" height="60" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="530" y="362" text-anchor="middle" fill="#D89040">Degraded score returned</text>
<text class="ts" x="530" y="380" text-anchor="middle" fill="#F0B060">resolutionPath: project tearsheet</text>

<line x1="150" y1="400" x2="150" y2="440" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="400" x2="340" y2="440" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="530" y1="400" x2="530" y2="440" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="440" width="600" height="56" rx="8" fill="#0D1E30" stroke="#2A80D0" stroke-width="0.5"/>
<text class="th" x="340" y="466" text-anchor="middle" fill="#4D90D8">Tearsheet renders integrity callout when issueType is set</text>
<text class="ts" x="340" y="484" text-anchor="middle" fill="#0D2540">"Why this score?" section shows the issue type and a button to the resolution path</text>

<text class="th" x="40" y="528">Why three branches matter</text>
<text class="ts" x="40" y="548">Suppression hides problems. Full scores on incomplete data lies. Degraded with an explicit cause and a route</text>
<text class="ts" x="40" y="566">to fix it is the only behavior that earns trust. The branch is what makes "Signal → Evidence → Action" real.</text>
</svg>