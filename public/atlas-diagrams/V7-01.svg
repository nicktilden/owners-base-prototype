<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 660" role="img" font-family="system-ui, -apple-system, sans-serif" height="100%">
<title>Health engine v6 — permission-aware, per-dimension integrity</title>
<desc>Updated calculation flow showing user context input and per-dimension integrity output.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill:#D8E4EE; }
.th { font-size: 14px; font-weight: 500; fill:#D8E4EE; }
.ts { font-size: 12px; fill:rgba(255,255,255,0.6); }
.new { font-size: 11px; font-weight: 500; fill:#FF8060; }
</style>
</defs>

<text class="ts" x="40" y="30">Inputs</text>
<rect x="40" y="44" width="160" height="44" rx="8" fill="#1E2D3D" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
<text class="th" x="120" y="71" text-anchor="middle">Tool data</text>

<rect x="40" y="100" width="160" height="44" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="120" y="127" text-anchor="middle" fill="#E06840">Risk Records</text>

<rect x="40" y="156" width="160" height="44" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="120" y="183" text-anchor="middle" fill="#8B84E0">HealthConfig</text>

<rect x="40" y="212" width="160" height="44" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="120" y="239" text-anchor="middle" fill="#D89040">User context</text>
<text class="new" x="205" y="239">new</text>

<rect x="40" y="268" width="160" height="44" rx="8" fill="#281E0D" stroke="#C07A18" stroke-width="0.5"/>
<text class="th" x="120" y="295" text-anchor="middle" fill="#D89040">currentDate</text>
<text class="new" x="205" y="295">new</text>

<text class="ts" x="240" y="30">Normalization</text>
<rect x="240" y="44" width="160" height="100" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="320" y="72" text-anchor="middle" fill="#2EA888">Normalize</text>
<text class="ts" x="320" y="92" text-anchor="middle" fill="#4EC9A8">Standardize, validate</text>
<text class="ts" x="320" y="110" text-anchor="middle" fill="#4EC9A8">Per-dimension integrity</text>
<text class="ts" x="320" y="128" text-anchor="middle" fill="#4EC9A8">Filter by user permissions</text>

<text class="ts" x="240" y="180">Current state path</text>
<rect x="240" y="200" width="160" height="56" rx="8" fill="#0D2520" stroke="#18A878" stroke-width="0.5"/>
<text class="th" x="320" y="226" text-anchor="middle" fill="#2EA888">Compute scores</text>
<text class="ts" x="320" y="244" text-anchor="middle" fill="#4EC9A8">Per-dimension formulas</text>

<text class="ts" x="240" y="284">Forecast path</text>
<rect x="240" y="300" width="160" height="56" rx="8" fill="#2A1A0E" stroke="#C84820" stroke-width="0.5"/>
<text class="th" x="320" y="326" text-anchor="middle" fill="#E06840">Compute exposure</text>
<text class="ts" x="320" y="344" text-anchor="middle" fill="#FF8060">probability × impact</text>

<text class="ts" x="440" y="180">Rule engine</text>
<rect x="440" y="200" width="160" height="56" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="520" y="226" text-anchor="middle" fill="#8B84E0">Apply current rules</text>
<text class="ts" x="520" y="244" text-anchor="middle" fill="#A89EF0">ruleType: 'current'</text>

<rect x="440" y="300" width="160" height="56" rx="8" fill="#1E1B3A" stroke="#7060E0" stroke-width="0.5"/>
<text class="th" x="520" y="326" text-anchor="middle" fill="#8B84E0">Apply forecast rules</text>
<text class="ts" x="520" y="344" text-anchor="middle" fill="#A89EF0">ruleType: 'forecast'</text>

<rect x="160" y="400" width="440" height="160" rx="8" fill="#0D1E30" stroke="#2A80D0" stroke-width="0.5"/>
<text class="th" x="380" y="424" text-anchor="middle" fill="#4D90D8">HealthResult v6</text>
<text class="ts" x="380" y="446" text-anchor="middle" fill="#0D2540">dimensions[] — each with status, forecastStatus, trend</text>
<text class="ts" x="380" y="464" text-anchor="middle" fill="#0D2540">each dimension carries its own integrity + signalOrigin</text>
<text class="ts" x="380" y="482" text-anchor="middle" fill="#0D2540">project-level rollup is computed, not stored</text>
<text class="ts" x="380" y="500" text-anchor="middle" fill="#0D2540">reasons[] per dimension for the tearsheet</text>
<text class="ts" x="380" y="518" text-anchor="middle" fill="#0D2540">snapshot timestamp + delta from previous snapshot</text>
<text class="ts" x="380" y="536" text-anchor="middle" fill="#0D2540">filtered to inputs the user can see (permission-aware)</text>
<text class="new" x="380" y="554" text-anchor="middle">Changes from v5: per-dimension integrity, user-scoped output, deltas included</text>

<line x1="200" y1="66" x2="240" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M200 122 Q220 122 230 200 Q240 280 240 320" stroke="#C84820" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<line x1="200" y1="178" x2="440" y2="216" stroke="#7060E0" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="200" y1="178" x2="440" y2="320" stroke="#7060E0" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="200" y1="234" x2="240" y2="100" stroke="#C07A18" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="200" y1="290" x2="240" y2="120" stroke="#C07A18" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<line x1="320" y1="144" x2="320" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="400" y1="228" x2="440" y2="228" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="400" y1="328" x2="440" y2="328" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" marker-end="url(#arrow)"/>

<path d="M520 256 Q520 340 420 400" stroke="#2A80D0" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<path d="M520 356 Q450 380 380 400" stroke="#2A80D0" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>

<text class="th" x="40" y="600">Key v6 changes</text>
<text class="ts" x="40" y="620">User context flows in — engine returns only what this user can see. Date injected for purity.</text>
<text class="ts" x="40" y="638">Integrity moves into each DimensionResult — partial degradation is now first-class.</text>
<text class="ts" x="40" y="656">Threshold rules are tagged 'current' or 'forecast' — same engine, two passes, two outputs.</text>
</svg>