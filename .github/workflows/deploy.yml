name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure Artifactory registry auth
        run: |
          echo "registry=https://artifacts.procoretech.com/artifactory/api/npm/npm/" >> ~/.npmrc
          echo "@procore:registry=https://artifacts.procoretech.com/artifactory/api/npm/npm/" >> ~/.npmrc
          echo "//artifacts.procoretech.com/artifactory/api/npm/npm/:_authToken=${{ secrets.ARTIFACTORY_NPM_TOKEN }}" >> ~/.npmrc

      - name: Verify registry access
        run: |
          npm ping --registry https://artifacts.procoretech.com/artifactory/api/npm/npm/

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
